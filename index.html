<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2B2620">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledelse">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Kaiser Ledelse</title>
<style>
/* ============================================================
   KAISER LEDELSE — samlet ledelses-hub (v1.1)
   PWA · GitHub Pages · Rediger KONFIGURATION øverst i koden
   ============================================================ */
:root{
  --paper:#F7F2E9; --card:#FFFDF8; --ink:#2B2620; --ink-soft:#6E6154;
  --espresso:#3E2F23; --dark:#2B2620; --line:#DCD1BE;
  --green:#1F7A4D; --green-soft:#E4F0E8;
  --amber:#C08A2D; --amber-soft:#F6EDDB;
  --red:#B3402F; --red-soft:#F7E6E2;
  --taupe:#8A7A63; --taupe-soft:#EFE9DD;
  --radius:14px; --shadow:0 1px 3px rgba(62,47,35,.08),0 4px 14px rgba(62,47,35,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.45;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 40px);
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer}
button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid var(--espresso);outline-offset:2px}

header{
  background:var(--dark);color:var(--paper);
  padding:calc(env(safe-area-inset-top,0px) + 18px) 18px 16px;
}
.hd{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px}
.hd-logo{width:52px;height:52px;flex-shrink:0}
.hd-brand{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#C9B99F;font-weight:600}
h1{font-family:Georgia,serif;font-size:26px;font-weight:700;margin-top:3px}
.hd-date{font-size:13px;color:#BFB1A0;margin-top:2px;text-transform:capitalize}
.lang-toggle{display:flex;border:1px solid #6B5847;border-radius:999px;overflow:hidden;flex-shrink:0;margin-top:3px}
.lang-toggle button{
  background:transparent;border:0;color:#C9B99F;font-size:12px;font-weight:700;
  padding:7px 13px;letter-spacing:.06em;
}
.lang-toggle button.on{background:var(--paper);color:var(--espresso)}

main{max-width:760px;margin:0 auto;padding:0 14px}
.sec-label{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--ink-soft);
  display:flex;align-items:center;gap:10px;margin:24px 0 12px;
}
.sec-label::after{content:"";flex:1;border-top:1px solid var(--line)}

/* ---- Værktøjsgitter ---- */
.tools{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:560px){.tools{grid-template-columns:1fr 1fr 1fr}}
.tool{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:14px 13px;display:flex;flex-direction:column;gap:8px;
  min-height:110px;position:relative;
}
.tool:active{transform:scale(.98)}
.tool-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff}
.tool-name{font-weight:800;font-size:14.5px;line-height:1.2}
.tool-desc{font-size:11.5px;color:var(--ink-soft);line-height:1.35}
.tool.disabled{opacity:.5}
.tool.disabled .missing{
  position:absolute;top:10px;right:10px;font-size:9px;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;background:var(--amber-soft);color:#8A6215;
  padding:3px 6px;border-radius:5px;
}

/* ---- Årskalender ---- */
.cal-toggle{
  display:flex;width:100%;align-items:center;justify-content:center;gap:8px;
  border:1.5px solid var(--line);background:var(--card);border-radius:12px;
  padding:11px;font-size:13.5px;font-weight:800;color:var(--espresso);margin-bottom:12px;
}
.cal-toggle .chev{transition:transform .18s ease;font-size:12px;color:var(--ink-soft)}
.cal-toggle.open .chev{transform:rotate(180deg)}
.cal-body{display:none}
.cal-body.open{display:block}
.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cal-nav button{
  border:1.5px solid var(--line);background:var(--card);border-radius:10px;
  width:38px;height:38px;font-size:17px;font-weight:800;color:var(--ink-soft);
}
.cal-year{font-family:Georgia,serif;font-size:20px;font-weight:700;min-width:64px;text-align:center}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.t-menu{background:var(--amber)} .dot.t-lukket{background:var(--red)}
.dot.t-stor{background:var(--green)} .dot.t-info{background:var(--taupe)}
.cal-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.cal-filters button{
  display:inline-flex;align-items:center;gap:6px;
  border:1.5px solid var(--line);background:var(--card);border-radius:999px;
  padding:6px 11px;font-size:11.5px;font-weight:700;color:var(--ink);
}
.cal-filters button.off{opacity:.38}
.cal-month{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:18px 0 8px;display:flex;align-items:center;gap:10px}
.cal-month::after{content:"";flex:1;border-top:1px dashed var(--line)}
.ev{
  background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
  padding:10px 12px;margin-bottom:8px;display:flex;gap:12px;align-items:center;
}
.ev.past{opacity:.5}
.ev.today{border-color:var(--green);border-width:1.5px}
.ev-date{flex-shrink:0;width:46px;text-align:center;border-right:1px dashed var(--line);padding-right:11px}
.ev-day{font-family:Georgia,serif;font-size:20px;font-weight:700;line-height:1}
.ev-wd{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-top:2px}
.ev-txt{flex:1;min-width:0}
.ev-title{font-weight:700;font-size:14.5px;line-height:1.25}
.ev-sub{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
.ev-type{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;
  font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);
  min-width:52px;text-align:center;
}
.next-up{
  background:var(--espresso);color:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:13px 14px;font-size:13.5px;display:flex;gap:10px;align-items:center;margin-bottom:4px;
}
.next-up b{font-weight:800}
.next-up .nu-count{
  flex-shrink:0;background:var(--paper);color:var(--espresso);font-weight:800;font-size:12px;
  border-radius:8px;padding:5px 9px;
}
.empty{
  text-align:center;padding:26px 14px;color:var(--ink-soft);font-size:13.5px;
  border:1.5px dashed var(--line);border-radius:var(--radius);
}

/* ---- Ugens mål (personlig) ---- */
.goal-week{font-size:12px;font-weight:700;color:var(--ink-soft);margin:-6px 0 10px}
.goal{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:13px;margin-bottom:9px;position:relative;overflow:hidden;
}
.goal.won{background:var(--green-soft);border-color:var(--green)}
.goal-text{font-weight:700;font-size:14.5px;padding-right:70px}
.goal.won .goal-text{color:var(--green)}
.goal-stamp{
  position:absolute;top:11px;right:11px;font-size:10px;font-weight:800;letter-spacing:.12em;
  background:var(--green);color:#fff;padding:4px 9px;border-radius:6px;transform:rotate(3deg);
}
.goal-prog{display:flex;align-items:center;gap:10px;margin-top:10px}
.goal-bar{flex:1;height:8px;background:#ECE8E0;border-radius:99px;overflow:hidden}
.goal-bar i{display:block;height:100%;background:var(--amber);border-radius:99px;transition:width .3s ease}
.goal.won .goal-bar i{background:var(--green)}
.goal-count{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;min-width:44px;text-align:right}
.goal-actions{display:flex;gap:7px;margin-top:11px}
.goal-actions button{
  border-radius:10px;padding:9px 13px;font-size:13px;font-weight:800;border:1.5px solid var(--line);
  background:#fff;color:var(--ink-soft);
}
.goal-actions .g-plus{background:var(--espresso);border-color:var(--espresso);color:#fff;flex:1}
.goal-actions .g-done{background:var(--green);border-color:var(--green);color:#fff;flex:1}
.goal-actions .g-del{flex:0}
.goal-add{
  border:1.5px dashed var(--line);border-radius:var(--radius);padding:13px;background:transparent;
}
.goal-add input[type=text]{
  width:100%;font:inherit;font-size:15px;padding:10px 12px;border:1.5px solid var(--line);
  border-radius:10px;background:var(--card);color:var(--ink);
}
.goal-add-row{display:flex;gap:8px;margin-top:8px;align-items:center}
.goal-add-row input[type=number]{
  width:84px;font:inherit;font-size:15px;padding:10px;border:1.5px solid var(--line);
  border-radius:10px;background:var(--card);color:var(--ink);
}
.goal-add-row .g-lbl{font-size:12px;color:var(--ink-soft);flex:1}
.goal-add-row button{
  background:var(--green);border:0;color:#fff;font-weight:800;font-size:13.5px;
  padding:11px 16px;border-radius:10px;
}
.wall{
  background:var(--espresso);color:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;display:flex;align-items:center;gap:14px;margin-top:12px;
}
.wall-num{font-family:Georgia,serif;font-size:34px;font-weight:700;line-height:1;color:#F2C94C}
.wall-txt{font-size:12.5px;color:#D8CBB8;line-height:1.4}
.wall-txt b{color:var(--paper)}
/* konfetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.cf{position:absolute;top:-12px;width:9px;height:13px;border-radius:2px;animation:cfFall linear forwards}
@keyframes cfFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(105vh) rotate(660deg);opacity:.85}
}

/* ---- To-do (pr. enhed) ---- */
.todo-add{display:flex;gap:8px;margin-bottom:10px}
.todo-add input{
  flex:1;font:inherit;font-size:16px;padding:11px 13px;border:1.5px solid var(--line);
  border-radius:12px;background:var(--card);color:var(--ink);min-width:0;
}
.todo-add button{
  background:var(--espresso);border:0;color:#fff;font-weight:800;font-size:14px;
  padding:0 18px;border-radius:12px;flex-shrink:0;
}
.todo{
  background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
  padding:11px 12px;margin-bottom:7px;display:flex;align-items:center;gap:11px;
}
.todo-chk{
  appearance:none;-webkit-appearance:none;width:23px;height:23px;flex-shrink:0;
  border:2px solid var(--taupe);border-radius:8px;background:#fff;cursor:pointer;position:relative;margin:0;
}
.todo-chk:checked{background:var(--green);border-color:var(--green)}
.todo-chk:checked::after{
  content:"";position:absolute;left:6px;top:2px;width:6px;height:12px;
  border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(42deg);
}
.todo-txt{flex:1;font-size:14.5px;font-weight:600;min-width:0;overflow-wrap:break-word}
.todo.done{opacity:.55}
.todo.done .todo-txt{text-decoration:line-through;text-decoration-color:#C5BBA9;color:var(--ink-soft)}
.todo-del{background:transparent;border:0;color:var(--ink-soft);font-size:15px;font-weight:800;padding:4px 6px;flex-shrink:0}
.todo-clear{
  display:block;width:100%;text-align:center;background:transparent;border:1.5px dashed var(--line);
  border-radius:12px;padding:10px;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-top:4px;
}

/* ---- Leverandører ---- */
.search{
  width:100%;font:inherit;font-size:16px;padding:12px 14px;border:1.5px solid var(--line);
  border-radius:12px;background:var(--card);color:var(--ink);margin-bottom:12px;
}
.cat{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:16px 0 8px;display:flex;align-items:center;gap:10px}
.cat::after{content:"";flex:1;border-top:1px dashed var(--line)}
.sup{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden;
}
.sup summary{
  list-style:none;display:flex;align-items:center;gap:10px;padding:13px;cursor:pointer;
}
.sup summary::-webkit-details-marker{display:none}
.sup summary::after{content:"▾";color:var(--ink-soft);font-size:12px;transition:transform .18s ease}
.sup[open] summary::after{transform:rotate(180deg)}
.sup-name{font-family:Georgia,serif;font-size:16.5px;font-weight:700;flex:1;min-width:0}
.sup-body{padding:0 13px 13px}
.sup-badge{font-size:10px;font-weight:800;letter-spacing:.06em;background:var(--green-soft);color:var(--green);padding:2px 7px;border-radius:5px}
.sup-row{display:flex;align-items:baseline;gap:8px;font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.sup-row .dots{flex:1;border-bottom:2px dotted #C9BDA8;transform:translateY(-3px);min-width:14px}
.sup-row .val{font-weight:700;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums;word-break:break-all}
.sup-note{font-size:12px;color:var(--ink-soft);margin-top:7px;font-style:italic}
.sup-actions{display:flex;gap:7px;margin-top:11px}
.sup-actions a,.sup-actions button{
  flex:1;text-align:center;border-radius:10px;padding:9px 4px;font-size:12.5px;font-weight:800;
  border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);
}
.sup-actions .act-call{background:var(--green);border-color:var(--green);color:#fff}
.sup-actions .act-mail{background:var(--espresso);border-color:var(--espresso);color:#fff}
footer{max-width:760px;margin:30px auto 0;padding:16px 14px 0;border-top:1px solid var(--line);
  font-size:10px;color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>

<header>
  <div class="hd">
    <img class="hd-logo" src="logo.png" alt="Café Kaiser">
    <div style="flex:1;min-width:0">
      <div class="hd-brand">Café Kaiser</div>
      <h1 id="t-title"></h1>
      <div class="hd-date" id="hd-date"></div>
    </div>
    <div class="lang-toggle" role="group" aria-label="Sprog / Language">
      <button id="btn-da" onclick="setLang('da')">DA</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main>
  <div class="sec-label" id="t-tools"></div>
  <div class="tools" id="tools"></div>

  <div class="sec-label" id="t-cal"></div>
  <div id="nextUp"></div>
  <button class="cal-toggle" id="calToggle" onclick="toggleCal()" aria-expanded="false">
    <span id="calToggleTxt"></span><span class="chev">▾</span>
  </button>
  <div class="cal-body" id="calBody">
    <div class="cal-nav">
      <button onclick="calYear--;renderCal()" aria-label="Forrige år">‹</button>
      <span class="cal-year" id="calYearLbl"></span>
      <button onclick="calYear++;renderCal()" aria-label="Næste år">›</button>
    </div>
    <div class="cal-filters" id="calFilters"></div>
    <div id="calendar"></div>
  </div>

  <div class="sec-label" id="t-goals"></div>
  <div class="goal-week" id="goalWeek"></div>
  <div id="goals"></div>
  <div class="goal-add">
    <input type="text" id="goalText" maxlength="120">
    <div class="goal-add-row">
      <span class="g-lbl" id="t-goaltarget"></span>
      <input type="number" id="goalTarget" min="1" max="99" inputmode="numeric" placeholder="–">
      <button onclick="addGoal()" id="t-goaladd"></button>
    </div>
  </div>
  <div id="wall"></div>

  <div class="sec-label" id="t-todo"></div>
  <div class="todo-add">
    <input type="text" id="todoText" maxlength="140" onkeydown="if(event.key==='Enter')addTodo()">
    <button onclick="addTodo()" id="t-todoadd"></button>
  </div>
  <div id="todos"></div>

  <div class="sec-label" id="t-sup"></div>
  <input class="search" id="supSearch" type="search" oninput="renderSuppliers()">
  <div id="suppliers"></div>
</main>

<footer>Kaiser Ledelse v1.4</footer>

<script>
/* ============================================================
   ★ KONFIGURATION — REDIGER HER ★
   ------------------------------------------------------------
   1) TOOLS: indsæt de rigtige URL'er til jeres systemer.
      url:"" viser kortet nedtonet med "Indsæt link"-mærke.

   2) EVENTS: årskalenderen. Ét objekt pr. begivenhed:
        date:  "ÅÅÅÅ-MM-DD"  (påkrævet)
        end:   "ÅÅÅÅ-MM-DD"  (valgfri – flerdages periode)
        type:  "menu" (menuskift) | "lukket" (lukkedag)
               | "stor" (stor dag) | "info" (andet)
        title: dansk titel · titleEn: engelsk (valgfri)
        loc:   fritekst, fx "Alle" eller "Hørsholm" (valgfri)
      Begivenheder kan ligge i vilkårlig rækkefølge –
      appen sorterer selv.

   3) SUPPLIERS: erstat eksemplerne med jeres leverandører.
      Tomme felter ("") skjules automatisk.
   ============================================================ */
const TOOLS = [
  {name:{da:"Vagtvarsling",en:"Staffing alerts"},
   desc:{da:"Kalender, events & bemandingsvarsler",en:"Calendar, events & staffing alerts"},
   ico:"📅", color:"#3E2F23", url:"https://nielsendesignpictures-hub.github.io/Event/index.html"},
  {name:{da:"Kontrolkalender",en:"Inspection calendar"},
   desc:{da:"FVST-kampagner 2026 & smiley-status",en:"Food authority campaigns & smiley status"},
   ico:"🛡", color:"#B3402F", url:"../kontrolkalender/"},
  {name:{da:"Håndværker",en:"Contractor status"},
   desc:{da:"Fejlmeldinger & status pr. café",en:"Fault reports & status per café"},
   ico:"🔧", color:"#C08A2D", url:"https://nielsendesignpictures-hub.github.io/Kaiser-standartkontrol/drift-hub.html"}
];

const EVENTS = [
  {date:"2026-07-09", type:"stor",   title:"Åbning Enghave Brygge",                              titleEn:"Enghave Brygge opening",                          loc:"Enghave Brygge"},
  /* August */
  {date:"2026-08-10", type:"stor",   title:"Første skoledag – sikr bemanding på vagtplan",       titleEn:"First school day – secure staffing on the rota",  loc:"Alle"},
  {date:"2026-08-24", type:"stor",   title:"DHL i Fælledparken",                                 titleEn:"DHL relay in Fælledparken",                       loc:"Alle"},
  /* September */
  {date:"2026-09-12", type:"stor",   title:"Vanløse fødselsdag: 2 år",                           titleEn:"Vanløse birthday: 2 years",                       loc:"Vanløse"},
  {date:"2026-09-17", type:"stor",   title:"Farum fødselsdag: 4 år",                             titleEn:"Farum birthday: 4 years",                         loc:"Farum"},
  {date:"2026-09-28", type:"menu",   title:"Caféerne skal have menukort, brunchsedler og plakater", titleEn:"Cafés receive menus, brunch sheets and posters", loc:"Alle"},
  /* Oktober */
  {date:"2026-10-05", type:"menu",   title:"Nyt menukort: skift menukort, plakater, brunchsedler", titleEn:"New menu: swap menus, posters, brunch sheets",   loc:"Alle"},
  {date:"2026-10-11", type:"info",   title:"Oppyntning til Halloween",                           titleEn:"Halloween decorations up",                        loc:"Alle"},
  {date:"2026-10-12", end:"2026-10-18", type:"stor", title:"Efterårsferie – uge 42",             titleEn:"Autumn holiday – week 42",                        loc:"Alle"},
  {date:"2026-10-19", end:"2026-10-21", type:"stor", title:"KNÆK CANCER: Stegt flæsk",           titleEn:"KNÆK CANCER: Stegt flæsk (charity)",              loc:"Alle"},
  /* November */
  {date:"2026-11-03", type:"info",   title:"Julemandens postkasse på plads",                     titleEn:"Santa's mailbox in place",                        loc:"Alle"},
  {date:"2026-11-10", type:"info",   title:"Mortensaften (ingen event)",                         titleEn:"St. Martin's Eve (no event)",                     loc:"Alle"},
  {date:"2026-11-15", type:"info",   title:"Oppyntning til jul",                                 titleEn:"Christmas decorations up",                        loc:"Alle"},
  {date:"2026-11-16", type:"menu",   title:"Opstart af byg selv-juleplatte",                     titleEn:"Launch of build-your-own Christmas platter",      loc:"Alle"},
  {date:"2026-11-27", type:"stor",   title:"Black Friday",                                       titleEn:"Black Friday",                                    loc:"Alle"},
  /* December */
  {date:"2026-12-22", type:"stor",   title:"Udkøring med julehjælp",                             titleEn:"Christmas aid deliveries",                        loc:"Alle"},

const LS="kl.";
const lsGet=(k,f)=>{try{const v=localStorage.getItem(LS+k);return v===null?f:v;}catch(e){return f;}};
const lsSet=(k,v)=>{try{localStorage.setItem(LS+k,v);}catch(e){}};
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

let lang=lsGet("lang","da");
let calYear=new Date().getFullYear();
let calOpen=false;
let activeTypes={menu:true,lukket:true,stor:true,info:true};
const t=()=>T[lang];

function toggleCal(){
  calOpen=!calOpen;
  document.getElementById("calBody").className="cal-body"+(calOpen?" open":"");
  const tg=document.getElementById("calToggle");
  tg.className="cal-toggle"+(calOpen?" open":"");
  tg.setAttribute("aria-expanded",calOpen);
  document.getElementById("calToggleTxt").textContent=calOpen?t().hideCal:t().showCal;
}

const NOW=new Date(); NOW.setHours(0,0,0,0);
const parseD=s=>{const p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);};
const evTitle=e=>(lang==="en"&&e.titleEn)?e.titleEn:e.title;

function setLang(l){lang=l;lsSet("lang",l);renderAll();}

function renderAll(){
  document.documentElement.lang=lang;
  document.getElementById("btn-da").className=lang==="da"?"on":"";
  document.getElementById("btn-en").className=lang==="en"?"on":"";
  document.getElementById("t-title").textContent=t().title;
  document.getElementById("t-tools").textContent=t().tools;
  document.getElementById("t-cal").textContent=t().cal;
  document.getElementById("t-sup").textContent=t().sup;
  document.getElementById("supSearch").placeholder=t().searchPh;
  document.getElementById("calToggleTxt").textContent=calOpen?t().hideCal:t().showCal;
  document.getElementById("hd-date").textContent=
    new Date().toLocaleDateString(t().locale,{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  renderTools();
  renderNextUp();
  renderCal();
  renderGoals();
  renderTodos();
  renderSuppliers();
}

/* ---- Værktøjer ---- */
function renderTools(){
  document.getElementById("tools").innerHTML=TOOLS.map(tool=>{
    const inner=`<span class="tool-ico" style="background:${esc(tool.color)}">${tool.ico}</span>
      <span class="tool-name">${esc(tool.name[lang])}</span>
      <span class="tool-desc">${esc(tool.desc[lang])}</span>`;
    return tool.url
      ? `<a class="tool" href="${esc(tool.url)}">${inner}</a>`
      : `<div class="tool disabled">${inner}<span class="missing">${t().missing}</span></div>`;
  }).join("");
}

/* ---- Årskalender ---- */
function sortedEvents(){
  return EVENTS.slice().sort((a,b)=>parseD(a.date)-parseD(b.date));
}
function renderNextUp(){
  const nxt=sortedEvents().find(e=>{
    const end=e.end?parseD(e.end):parseD(e.date);
    return end>=NOW && activeTypes[e.type||"info"]!==false;
  });
  const el=document.getElementById("nextUp");
  if(!nxt){el.innerHTML="";return;}
  const days=Math.round((parseD(nxt.date)-NOW)/86400000);
  el.innerHTML=`<div class="next-up"><span style="flex:1"><b>${t().nextUp}:</b> ${esc(evTitle(nxt))}</span>
  <span class="nu-count">${esc(t().inDays(Math.max(0,days)))}</span></div>`;
}
function renderCal(){
  document.getElementById("calYearLbl").textContent=calYear;
  /* filterknapper: farvet prik + tekst udenfor farven */
  document.getElementById("calFilters").innerHTML=["menu","lukket","stor","info"].map(ty=>
    `<button class="${activeTypes[ty]?"":"off"}" onclick="toggleType('${ty}')">
      <span class="dot t-${ty}"></span>${esc(t().types[ty])}</button>`
  ).join("");

  const evs=sortedEvents().filter(e=>{
    const ty=e.type||"info";
    if(!activeTypes[ty])return false;
    const d=parseD(e.date), end=e.end?parseD(e.end):d;
    return d.getFullYear()===calYear||end.getFullYear()===calYear;
  });
  const el=document.getElementById("calendar");
  if(!evs.length){el.innerHTML=`<div class="empty">${esc(t().noEvents)}</div>`;renderNextUp();return;}

  let html="",lastMonth=-1;
  evs.forEach(e=>{
    const d=parseD(e.date), end=e.end?parseD(e.end):d;
    const ty=e.type||"info";
    if(d.getMonth()!==lastMonth){lastMonth=d.getMonth();html+=`<div class="cal-month">${t().months[lastMonth]}</div>`;}
    const isPast=end<NOW;
    const isToday=d<=NOW&&end>=NOW;
    let dateSub="";
    if(e.end){
      dateSub=d.getDate()+"."+(d.getMonth()+1)+"."+" – "+end.getDate()+"."+(end.getMonth()+1)+".";
    }
    const sub=[dateSub,e.loc||""].filter(Boolean).join(" · ");
    html+=`<div class="ev ${isPast?"past":""} ${isToday?"today":""}">
      <span class="ev-date"><span class="ev-day">${d.getDate()}</span>
      <span class="ev-wd">${t().wd[d.getDay()]}</span></span>
      <span class="ev-txt"><span class="ev-title">${esc(evTitle(e))}</span>
      ${sub?`<span class="ev-sub" style="display:block">${esc(sub)}</span>`:""}</span>
      <span class="ev-type"><span class="dot t-${ty}"></span>${esc(t().types[ty])}</span>
    </div>`;
  });
  el.innerHTML=html;
  renderNextUp();
}
function toggleType(ty){activeTypes[ty]=!activeTypes[ty];renderCal();}

/* ---- Ugens mål (personlig, gemmes kun på denne enhed) ---- */
function isoWeek(d){
  const x=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=x.getUTCDay()||7;
  x.setUTCDate(x.getUTCDate()+4-day);
  const y0=new Date(Date.UTC(x.getUTCFullYear(),0,1));
  return {y:x.getUTCFullYear(), w:Math.ceil(((x-y0)/86400000+1)/7)};
}
function weekKey(){const k=isoWeek(new Date());return k.y+"-W"+String(k.w).padStart(2,"0");}

function loadGoals(){
  let g;
  try{g=JSON.parse(lsGet("goals",'{"current":[],"archive":[]}'));}catch(e){g={current:[],archive:[]};}
  /* ugerul: flyt gamle mål til arkivet */
  const wk=weekKey();
  const stay=[],gone=[];
  (g.current||[]).forEach(x=>(x.week===wk?stay:gone).push(x));
  if(gone.length){g.archive=(g.archive||[]).concat(gone);g.current=stay;saveGoals(g);}
  else{g.current=stay;}
  return g;
}
function saveGoals(g){lsSet("goals",JSON.stringify(g));}

function addGoal(){
  const txtEl=document.getElementById("goalText");
  const tgtEl=document.getElementById("goalTarget");
  const text=(txtEl.value||"").trim();
  if(!text)return txtEl.focus();
  const target=parseInt(tgtEl.value,10);
  const g=loadGoals();
  g.current.push({
    id:Date.now(), text:text, week:weekKey(),
    type:(target>0?"count":"done"),
    target:(target>0?target:1), progress:0, won:false
  });
  saveGoals(g);
  txtEl.value="";tgtEl.value="";
  renderGoals();
}
function goalPlus(id){
  const g=loadGoals();
  const x=g.current.find(x=>x.id===id);
  if(!x||x.won)return;
  x.progress++;
  if(x.progress>=x.target){x.won=true;x.wonTs=Date.now();celebrate();}
  saveGoals(g);renderGoals();
}
function goalDoneMark(id){
  const g=loadGoals();
  const x=g.current.find(x=>x.id===id);
  if(!x||x.won)return;
  x.progress=x.target;x.won=true;x.wonTs=Date.now();
  celebrate();saveGoals(g);renderGoals();
}
function goalDel(id){
  if(!confirm(t().goalConfirmDel))return;
  const g=loadGoals();
  g.current=g.current.filter(x=>x.id!==id);
  saveGoals(g);renderGoals();
}
function celebrate(){
  if(navigator.vibrate)navigator.vibrate([40,60,40]);
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches)return;
  let c=document.getElementById("confetti");
  if(!c){c=document.createElement("div");c.id="confetti";document.body.appendChild(c);}
  const colors=["#F2C94C","#1F7A4D","#C08A2D","#B3402F","#F7F2E9","#8A7A63"];
  for(let i=0;i<70;i++){
    const p=document.createElement("i");
    p.className="cf";
    p.style.left=(Math.random()*100)+"vw";
    p.style.background=colors[i%colors.length];
    p.style.animationDuration=(1+Math.random()*1.1)+"s";
    p.style.animationDelay=(Math.random()*.35)+"s";
    p.style.width=(6+Math.random()*7)+"px";
    p.style.height=(9+Math.random()*8)+"px";
    c.appendChild(p);
    setTimeout(()=>p.remove(),2600);
  }
}
function renderGoals(){
  const g=loadGoals();
  const wk=isoWeek(new Date());
  document.getElementById("t-goals").textContent=t().goals;
  document.getElementById("goalWeek").textContent=t().goalWeek(wk.w);
  document.getElementById("goalText").placeholder=t().goalPh;
  document.getElementById("t-goaltarget").textContent=t().goalTarget;
  document.getElementById("t-goaladd").textContent=t().goalAdd;

  document.getElementById("goals").innerHTML=g.current.map(x=>{
    const pct=Math.min(100,x.progress/x.target*100);
    let actions="";
    if(!x.won){
      actions=x.type==="count"
        ?`<button class="g-plus" onclick="goalPlus(${x.id})">${t().goalPlus}</button>`
        :`<button class="g-done" onclick="goalDoneMark(${x.id})">${t().goalDone}</button>`;
    }
    actions+=`<button class="g-del" onclick="goalDel(${x.id})" aria-label="Slet">${t().goalDel}</button>`;
    const prog=x.type==="count"
      ?`<div class="goal-prog"><div class="goal-bar"><i style="width:${pct}%"></i></div>
        <span class="goal-count">${x.progress}/${x.target}</span></div>`
      :"";
    return `<div class="goal ${x.won?"won":""}">
      ${x.won?`<span class="goal-stamp">${t().goalWon}</span>`:""}
      <div class="goal-text">${esc(x.text)}</div>
      ${prog}
      <div class="goal-actions">${actions}</div>
    </div>`;
  }).join("");

  /* sejrsvæg */
  const archWins=(g.archive||[]).filter(x=>x.won).length;
  const curWins=g.current.filter(x=>x.won).length;
  const wins=archWins+curWins;
  const tot=(g.archive||[]).length+g.current.length;
  document.getElementById("wall").innerHTML=wins
    ?`<div class="wall"><span class="wall-num">${wins}</span><span class="wall-txt">${t().wallTxt(wins,tot)}</span></div>`
    :`<div class="wall"><span class="wall-num">0</span><span class="wall-txt">${esc(t().wallEmpty)}</span></div>`;
}

/* ---- To-do (pr. enhed) ---- */
function loadTodos(){
  try{return JSON.parse(lsGet("todos","[]"));}catch(e){return [];}
}
function saveTodos(list){lsSet("todos",JSON.stringify(list));}
function addTodo(){
  const el=document.getElementById("todoText");
  const text=(el.value||"").trim();
  if(!text)return el.focus();
  const list=loadTodos();
  list.push({id:Date.now(),text:text,done:false});
  saveTodos(list);
  el.value="";
  renderTodos();
  el.focus();
}
function toggleTodo(id){
  const list=loadTodos();
  const x=list.find(x=>x.id===id);
  if(x)x.done=!x.done;
  saveTodos(list);renderTodos();
}
function delTodo(id){
  saveTodos(loadTodos().filter(x=>x.id!==id));renderTodos();
}
function clearTodos(){
  saveTodos(loadTodos().filter(x=>!x.done));renderTodos();
}
function renderTodos(){
  document.getElementById("t-todo").textContent=t().todo;
  document.getElementById("todoText").placeholder=t().todoPh;
  document.getElementById("t-todoadd").textContent=t().todoAdd;
  const list=loadTodos();
  /* åbne først, udførte nederst – behold indbyrdes rækkefølge */
  const sorted=list.filter(x=>!x.done).concat(list.filter(x=>x.done));
  const el=document.getElementById("todos");
  if(!list.length){
    el.innerHTML=`<div class="empty">${esc(t().todoEmpty)}</div>`;
    return;
  }
  let html=sorted.map(x=>`<div class="todo ${x.done?"done":""}">
    <input type="checkbox" class="todo-chk" ${x.done?"checked":""} onchange="toggleTodo(${x.id})">
    <span class="todo-txt">${esc(x.text)}</span>
    <button class="todo-del" onclick="delTodo(${x.id})" aria-label="Slet">✕</button>
  </div>`).join("");
  const doneCount=list.filter(x=>x.done).length;
  if(doneCount)html+=`<button class="todo-clear" onclick="clearTodos()">${esc(t().todoClear(doneCount))}</button>`;
  el.innerHTML=html;
}

/* ---- Leverandører ---- */
function telHref(p){return "tel:"+String(p).replace(/[^\d+]/g,"");}
function renderSuppliers(){
  const q=(document.getElementById("supSearch").value||"").trim().toLowerCase();
  const hit=s=>!q||[s.name,s.cat,s.contact,s.note,s.covers,s.customerNo]
    .some(f=>(f||"").toLowerCase().includes(q));
  const list=SUPPLIERS.filter(hit);
  const el=document.getElementById("suppliers");
  if(!list.length){el.innerHTML=`<div class="empty">${esc(t().noSup(q))}</div>`;return;}
  el.innerHTML=list.map(s=>{
    let r="";
    if(s.contact)   r+=`<div class="sup-row"><span>${t().contact}</span><span class="dots"></span><span class="val">${esc(s.contact)}</span></div>`;
    if(s.phone)     r+=`<div class="sup-row"><span>${t().phone}</span><span class="dots"></span><span class="val">${esc(s.phone)}</span></div>`;
    if(s.email)     r+=`<div class="sup-row"><span>${t().email}</span><span class="dots"></span><span class="val">${esc(s.email)}</span></div>`;
    if(s.customerNo)r+=`<div class="sup-row"><span>${t().custNo}</span><span class="dots"></span><span class="val">${esc(s.customerNo)}</span></div>`;
    let a="";
    if(s.phone)a+=`<a class="act-call" href="${esc(telHref(s.phone))}">${t().call}</a>`;
    if(s.email)a+=`<a class="act-mail" href="mailto:${esc(s.email)}">${t().mail}</a>`;
    if(s.customerNo)a+=`<button onclick="copyTxt('${esc(s.customerNo)}',this)">${t().copy}</button>`;
    return `<details class="sup"${q?" open":""}>
      <summary><span class="sup-name">${esc(s.name)}</span>
      ${s.covers?`<span class="sup-badge">${esc(s.covers)}</span>`:""}</summary>
      <div class="sup-body">
        ${r}
        ${s.note?`<div class="sup-note">${esc(s.note)}</div>`:""}
        ${a?`<div class="sup-actions">${a}</div>`:""}
      </div>
    </details>`;
  }).join("");
}
function copyTxt(txt,btn){
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{
      const o=btn.textContent;btn.textContent=t().copied;
      setTimeout(()=>{btn.textContent=o;},1400);
    });
  }
}

renderAll();

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
